upstream ztrust_control_plane {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream oa_backend {
    # Replace this with the e-cology / OA test backend.
    server 10.0.0.10:80;
    keepalive 64;
}

server {
    listen 80;
    server_name www.e-cology.com.cn;

    client_max_body_size 200m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    location = /_ztrust_auth_check {
        internal;
        proxy_pass http://ztrust_control_plane/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ztrust/login {
        proxy_pass http://ztrust_control_plane/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ztrust/logout {
        proxy_pass http://ztrust_control_plane/auth/logout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 401 = @ztrust_unauthorized;
    error_page 403 = @ztrust_forbidden;

    location @ztrust_unauthorized {
        default_type application/json;
        return 401 '{"error":"login_required"}';
    }

    location @ztrust_forbidden {
        default_type application/json;
        return 403 '{"error":"forbidden"}';
    }

    location / {
        auth_request /_ztrust_auth_check;
        auth_request_set $ztrust_user_id $upstream_http_x_ztrust_user_id;
        auth_request_set $ztrust_username $upstream_http_x_ztrust_username;

        proxy_pass http://oa_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-ZTrust-User-ID $ztrust_user_id;
        proxy_set_header X-ZTrust-Username $ztrust_username;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_buffering off;

        log_by_lua_block {
            local cjson = require "cjson.safe"
            local http = require "resty.http"
            local body = cjson.encode({
                user_id = tonumber(ngx.var.ztrust_user_id) or 0,
                username = ngx.var.ztrust_username or "",
                source_ip = ngx.var.remote_addr,
                domain = ngx.var.host,
                path = ngx.var.request_uri,
                method = ngx.var.request_method,
                status_code = ngx.status,
                duration_ms = math.floor((ngx.now() - ngx.req.start_time()) * 1000),
                proxy_result = ngx.var.upstream_status or "blocked",
                user_agent = ngx.var.http_user_agent or ""
            })
            if body then
                local cli = http.new()
                cli:set_timeout(100)
                cli:request_uri("http://127.0.0.1:8080/audit/access", {
                    method = "POST",
                    body = body,
                    headers = { ["Content-Type"] = "application/json" },
                    keepalive = false
                })
            end
        }
    }
}

